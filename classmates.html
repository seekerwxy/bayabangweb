<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同学录</title>
    <link rel="stylesheet" href="css/beauty.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav" id="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-badge" title="班级首页" aria-label="班级首页">
                <img src="photos/banhui.jpg" alt="班徽" width="38" height="38"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                <span class="nav-badge-placeholder" style="display:none;">班徽</span>
            </a>
            <ul class="nav-links" id="navLinksDesktop">
                <li><a href="index.html">首页</a></li>
                <li><a href="teacher.html">班主任</a></li>
                <li><a href="classmates.html" class="active">同学录</a></li>
                <li><a href="memories.html">时光回忆馆</a></li>
                <li><a href="messages.html">留言板</a></li>
            </ul>
            <button class="hamburger" id="hamburgerBtn" aria-label="菜单" aria-expanded="false">
                <svg class="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <line x1="4" y1="6" x2="20" y2="6"/>
                    <line x1="4" y1="12" x2="20" y2="12"/>
                    <line x1="4" y1="18" x2="20" y2="18"/>
                </svg>
                <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <line x1="6" y1="6" x2="18" y2="18"/>
                    <line x1="18" y1="6" x2="6" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="nav-mobile-dropdown" id="mobileDropdown">
            <a href="index.html">首页</a>
            <a href="teacher.html">班主任专属空间</a>
            <a href="classmates.html" class="active">同学录</a>
            <a href="memories.html">时光回忆馆</a>
            <a href="messages.html">留言板</a>
        </div>
    </nav>

    <main class="main">
        <section class="page-header">
            <div class="badge">Classmates</div>
            <h2>同学录</h2>
        </section>

        <div class="members-grid" id="membersGrid">
            <div class="empty-message">正在加载同学信息…</div>
        </div>
    </main>

    <footer class="footer">
        <span>献给最好的班级和班主任</span>
        <span class="footer-line">— 我已燃尽 —</span>
    </footer>

    <script>
        // ---------- 移动端汉堡菜单 ----------
        (function() {
            const btn = document.getElementById('hamburgerBtn');
            const dropdown = document.getElementById('mobileDropdown');
            if (!btn || !dropdown) return;
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = dropdown.classList.contains('visible');
                if (isOpen) {
                    dropdown.classList.remove('visible');
                    btn.classList.remove('open');
                    btn.setAttribute('aria-expanded', 'false');
                } else {
                    dropdown.classList.add('visible');
                    btn.classList.add('open');
                    btn.setAttribute('aria-expanded', 'true');
                }
            });
            dropdown.querySelectorAll('a').forEach(function(link) {
                link.addEventListener('click', function() {
                    dropdown.classList.remove('visible');
                    btn.classList.remove('open');
                    btn.setAttribute('aria-expanded', 'false');
                });
            });
            document.addEventListener('click', function(event) {
                if (!dropdown.contains(event.target) && event.target !== btn && !btn.contains(event.target)) {
                    dropdown.classList.remove('visible');
                    btn.classList.remove('open');
                    btn.setAttribute('aria-expanded', 'false');
                }
            });
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && dropdown.classList.contains('visible')) {
                    dropdown.classList.remove('visible');
                    btn.classList.remove('open');
                    btn.setAttribute('aria-expanded', 'false');
                    btn.focus();
                }
            });
        })();

        // ---------- 同学录逻辑 ----------
        const API_BASE = '/api/classmates.php';

        async function fetchClassmates() {
            try {
                const resp = await fetch(API_BASE);
                const data = await resp.json();
                renderClassmates(data);
            } catch (err) {
                document.getElementById('membersGrid').innerHTML = '<div class="empty-message">加载失败，请刷新重试</div>';
            }
        }

        function formatBirthday(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '';
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}月${day}日`;
        }

        function renderClassmates(classmates) {
            const grid = document.getElementById('membersGrid');
            if (!classmates.length) {
                grid.innerHTML = '<div class="empty-message">还没有同学信息，快让大家都来完善吧~</div>';
                return;
            }
            grid.innerHTML = classmates.map(member => {
                const placeholder = member.name.charAt(0);
                const birthdayStr = formatBirthday(member.birthday);
                // 确保 avatar 是有效且非空字符串
                const avatar = (member.avatar && member.avatar !== 'null' && member.avatar.trim() !== '') 
                                ? member.avatar.trim() 
                                : '';
                
                // 调试：在浏览器控制台打印每个同学的名字和头像路径
                console.log(member.name, '头像路径:', avatar);

                if (avatar) {
                    // 有头像：显示 img，隐藏占位符
                    return `
                        <div class="member-card">
                            <div class="member-avatar">
                                <img src="${escapeHtml(avatar)}" alt="${escapeHtml(member.name)}" loading="lazy"
                                     onload="this.classList.add('loaded')"
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                <span class="member-avatar-placeholder" style="display:none;">${placeholder}</span>
                            </div>
                            <div class="member-name">${escapeHtml(member.name)}</div>
                            <div class="member-birthday">${birthdayStr || '🎂'}</div>
                            <div class="member-quote">${escapeHtml(member.quote || '')}</div>
                        </div>
                    `;
                } else {
                    // 无头像：只显示占位符
                    return `
                        <div class="member-card">
                            <div class="member-avatar">
                                <span class="member-avatar-placeholder">${placeholder}</span>
                            </div>
                            <div class="member-name">${escapeHtml(member.name)}</div>
                            <div class="member-birthday">${birthdayStr || '🎂'}</div>
                            <div class="member-quote">${escapeHtml(member.quote || '')}</div>
                        </div>
                    `;
                }
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        fetchClassmates();
    </script>
</body>
</html>
